name: "CITL CodeQL Config"

# IMPORTANT: paths-ignore only works for interpreted languages (JS/TS) and
# build-mode: none. For C# with build-mode: manual, CodeQL traces the Roslyn
# compiler and extracts source-generated files at the compiler level —
# paths-ignore has NO effect. For C#, SARIF filtering is done post-analysis
# by advanced-security/filter-sarif in the codeql.yml workflow.
#
# These patterns still protect the JS/TS analysis from scanning unwanted paths.
paths-ignore:
  - "**/bin/**"
  - "**/obj/**"
  - "**/generated/**"
  - "**/*.Designer.cs"
  - "**/*.generated.cs"
  - "**/*.g.cs"
  - "**/*.g.i.cs"
  - "src/CITL.Web/node_modules/**"
  - "src/CITL.Web/dist/**"
  - "grafana/**"
  - "scripts/**"
