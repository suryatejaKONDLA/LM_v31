# Claude Code — AI assistant triggered by @claude mentions
#
# Usage:
#   - Comment "@claude <your request>" on any PR or issue
#   - Claude will analyze the code and respond or create a fix PR
#
# Required secret: ANTHROPIC_API_KEY (repo Settings → Secrets → Actions)
# Docs: https://docs.anthropic.com/en/docs/claude-code/github-actions

name: Claude

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1

      - name: Run Claude
        uses: anthropics/claude-code-action@v1.0.70
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
