# CodeQL � Security & Quality scanning with Copilot Autofix
#
# On every alert found:
#   - Security tab shows alerts with exact file + line
#   - copilot-autofix.yml auto-creates an issue and assigns Copilot
#   - Copilot creates a new branch (copilot/fix-...) and opens a fix PR
#
# Versions: actions/checkout@v6.0.2  actions/setup-dotnet@v5.1.0  github/codeql-action@v4.32.5  dependency-review-action@v4.8.3  github-script@v8.0.0
# Docs: https://docs.github.com/en/code-security/code-scanning

name: CodeQL

on:
  push:
    branches: [master]
    paths-ignore:
      - "**/*.md"
      - "**/*.txt"
      - "grafana/**"
      - "scripts/**"
  pull_request:
    branches: [master]
    paths-ignore:
      - "**/*.md"
      - "**/*.txt"
  schedule:
    # Daily at 06:00 UTC
    - cron: "0 6 * * *"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: csharp
            build-mode: manual
          - language: javascript-typescript
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup .NET
        if: matrix.language == 'csharp'
        uses: actions/setup-dotnet@v5.1.0
        with:
          dotnet-version: "11.0.x"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4.32.5
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended, security-and-quality
          config-file: .github/codeql/codeql-config.yml

      - name: Restore NuGet packages
        if: matrix.build-mode == 'manual'
        run: dotnet restore CITL.slnx

      - name: Build (C# manual)
        if: matrix.build-mode == 'manual'
        run: dotnet build CITL.slnx --configuration Release --no-restore

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4.32.5
        with:
          category: "/language:${{ matrix.language }}"
          upload: always
          # Second-layer filter: strips any alerts that still reference generated
          # paths even after paths-ignore (e.g. in-memory Roslyn source generators).
          filter-sarif-files: |
            **/obj/**
            **/bin/**
            **/*.generated.cs
            **/*.Designer.cs
            **/*.g.cs
            **/*.g.i.cs

  # Blocks PRs that introduce high/critical vulnerable packages
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Dependency Review
        uses: actions/dependency-review-action@v4.8.3
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
