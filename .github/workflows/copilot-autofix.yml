# Copilot Auto-Fix — Assign CodeQL alerts to Copilot automatically
#
# Flow:
#   1. CodeQL workflow completes (or daily schedule fires)
#   2. This workflow queries the Code Scanning API for open error/warning alerts
#   3. Creates a GitHub Issue per new alert (deduplicates by alert number in title)
#   4. Assigns the issue to Copilot coding agent
#   5. Copilot creates a new branch (copilot/fix-issue-NNN) and opens a fix PR
#
# Notification: GitHub natively emails @suryatejaKONDLA when mentioned in the issue.
# No secrets needed — uses the built-in GITHUB_TOKEN.

name: Copilot Auto-Fix

on:
  workflow_run:
    workflows: ["CodeQL"]
    types: [completed]
  schedule:
    # 30 min after the daily CodeQL run (06:00 UTC)
    - cron: "30 6 * * *"

jobs:
  create-fix-issues:
    name: Create issues for new CodeQL alerts
    runs-on: ubuntu-latest

    # Skip if CodeQL was cancelled
    if: |
      github.event_name == 'schedule' ||
      github.event.workflow_run.conclusion != 'cancelled'

    permissions:
      contents: read
      issues: write
      security-events: read

    steps:
      - name: Create issues and assign to Copilot
        uses: actions/github-script@v8.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Fetch all open code scanning alerts
            const alerts = await github.paginate(
              github.rest.codeScanning.listAlertsForRepo,
              {
                owner:    context.repo.owner,
                repo:     context.repo.repo,
                state:    'open',
                per_page: 100,
              }
            );

            // Only error / warning severity
            const relevant = alerts.filter(a =>
              a.rule.severity === 'error' || a.rule.severity === 'warning'
            );

            // Safety net: skip alerts in auto-generated / build-output paths.
            // Even with SARIF filtering in the CodeQL workflow, dismissed alerts
            // can reopen when the same code is re-extracted. This prevents
            // issues being created for obj/, bin/, and source-generator output.
            const generatedPathPatterns = [
              /[\\/]obj[\\/]/i,
              /[\\/]bin[\\/]/i,
              /\.generated\.cs$/i,
              /\.Designer\.cs$/i,
              /\.g\.cs$/i,
              /\.g\.i\.cs$/i,
            ];
            const filtered = relevant.filter(a => {
              const path = a.most_recent_instance?.location?.path ?? '';
              return !generatedPathPatterns.some(p => p.test(path));
            });

            if (filtered.length === 0) {
              core.info('No open error/warning alerts (after filtering generated paths) — nothing to do.');
              return;
            }

            // Fetch existing open security issues to avoid duplicates
            const existing = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner:    context.repo.owner,
                repo:     context.repo.repo,
                labels:   'security',
                state:    'open',
                per_page: 100,
              }
            );
            const existingTitles = new Set(existing.map(i => i.title));

            for (const alert of filtered) {
              const rule     = alert.rule;
              const loc      = alert.most_recent_instance?.location;
              const ref      = alert.most_recent_instance?.ref ?? 'refs/heads/master';
              const branch   = ref.replace('refs/heads/', '');
              const severity = rule.severity ?? 'unknown';
              const emoji    = severity === 'error' ? '🔴' : '🟡';

              // Include alert.number in title so deduplication is stable
              const title = `[Security] ${rule.name} in ${loc?.path ?? 'unknown'} (alert #${alert.number})`;

              if (existingTitles.has(title)) {
                core.info(`Skipping alert #${alert.number} — issue already exists.`);
                continue;
              }

              const body = [
                `## ${emoji} CodeQL Alert: ${rule.name}`,
                '',
                `**Rule:** \`${rule.id}\` — ${rule.description ?? ''}`,
                `**Severity:** ${severity}`,
                `**Branch:** \`${branch}\``,
                loc ? `**Location:** \`${loc.path}\` line ${loc.start_line}` : '',
                '',
                `**Alert URL:** ${alert.html_url}`,
                '',
                '---',
                '### Task',
                'Fix the vulnerability identified above.',
                'Follow the rules in `CLAUDE.md` and `CODING_STANDARDS.md`.',
                '',
                '> This issue was created automatically by the Copilot Auto-Fix workflow.',
                '',
                'cc @suryatejaKONDLA',
              ].join('\n');

              const issue = await github.rest.issues.create({
                owner:  context.repo.owner,
                repo:   context.repo.repo,
                title,
                body,
                labels: ['security', 'bug', 'copilot'],
              });

              await github.rest.issues.addAssignees({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: issue.data.number,
                assignees:    ['github-copilot[bot]'],
              });

              core.notice(`Created issue #${issue.data.number} for CodeQL alert #${alert.number}`);
            }
